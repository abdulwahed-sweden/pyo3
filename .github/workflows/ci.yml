name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Run tests
        run: cargo test --workspace 2>&1 | tee test-output.txt
      - name: Report test count
        run: grep "^test result:" test-output.txt || true

  test-python:
    needs: [test-rust]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: pip install maturin
      - name: Build pyforge-django
        run: maturin develop -m pyforge-django/Cargo.toml --release
      - name: Install test dependencies
        run: pip install django pytest pytest-django
      - name: Run Django tests
        run: |
          cd pyforge-django
          python -m pytest tests/ -v 2>&1 | tee test-output.txt
      - name: Report test count
        run: grep -E "passed|failed|error" pyforge-django/test-output.txt || true

  test-windows:
    needs: [test-rust]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace
      - name: Install maturin
        run: pip install maturin
      - name: Build pyforge-django
        run: maturin develop -m pyforge-django/Cargo.toml --release
      - name: Confirm build
        run: python -c "import pyforge_django; print('pyforge_django loaded successfully')"
